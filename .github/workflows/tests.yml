name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  agent-tests:
    name: Agent tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install agent dependencies
        run: uv sync --frozen --group dev

      - name: Run agent tests
        run: uv run pytest tests -q -m "not integration"

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe+convex
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        # Discovers all *.test.ts files via bun:test, including:
        #   - components/agent/ConversationTimeline.test.ts (view-branch, trace anti-bleed,
        #     pending-bubble lifecycle, thread-change guard, run bootstrap, deriveTitle, formatTraceKind)
        #   - components/agent/ThreadRail.test.ts (timeAgo, mapConvexThread, seenIdsRef animation guard,
        #     displayedThreads merge logic)
        #   - app/api/agent/threads/[threadId]/route.test.ts (rename/delete handlers)
        #   - convex/*.test.ts (agentState, traces, attendance, outreach)
        run: bun run test
